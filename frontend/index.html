<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>†Black Knight† 飲食店混雑把握システム</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <h1>店内の混雑状況</h1>
        <p class="shop-name">店舗名：†Black Knight† カフェ</p>
        <div class="freshness-area">
            <span id="freshness">状態を確認中…</span>
        </div>
    </header>

    <main>
        <div class="card total-card">
            <h2>全体のおおよその残席数</h2>
            <p class="seat-number"><span id="remaining-seats"><span id="seats">--</span></span></p>
            <p class="update-time">最終更新時間：<span id="updated-at">--</span></p>
        </div>

        <div class="seats-container">
            <div class="card">
                <h3>カウンター席</h3>
                <div id="coounter-status" class="seat-status">
                    <span class="vacant-num">--</span>
                    <span class="unit">  席</span>
                    <span class="total-text">/ 全 <span class="total-num">--</span> 席中</span>
                </div>
                <p class="update-time">最終更新時間：<span id="counter-updated-at">--</span></p>
            </div>

            <div class="card">
                <h3>テーブル席</h3>
                <div id="table-status" class="seat-status">
                    <span class="vacant-num">--</span>
                    <span class="unit">  席</span>
                    <span class="total-text">/ 全 <span class="total-num">--</span> 席中</span>
                </div>
                <p class="update-time">最終更新時間：<span id="table-updated-at">--</span></p>
            </div>
        </div>
    </main>

    <script src="js/main.js"></script>
</body>
</html>
