<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>†Black Knight† 飲食店混雑把握システム</title>
    <link rel="stylesheet" href="css/style.css">
</head>
<body>

    <header>
        <h1>店内の混雑状況</h1>
        <p class="shop-name">店舗名：†Black Knight† カフェ</p>
        <div class="freshness-area">
            <span id="freshness">状態を確認中…</span>
        </div>
    </header>

    <main>
        <div class="card total-card">
            <h2>全体のおおよその残席数</h2>
            <p class="seat-number"><span id="remains-seats"><span id="seats">--</span></span></p>
            <p class="update-time">最終更新時間：<span id="updated-at">--</span></p>
        </div>

        <div class="seats-container">
            <div class="card">
                <h3>カウンター席</h3>
                <p class="seat-number"><span id="counter-status">--</span></p>
                <p class="update-time">最終更新時間：<span id="details-updated-at"></span></p>
            </div>

            <div class="card">
                <h3>テーブル席</h3>
                <p class="seat-number"><span id="table-status">--</span></p>
                <p class="update-time">最終更新時間：<span id="details-updated-at"></span></p>
            </div>
        </div>
    </main>

    <script src="js/main.js"></script>
</body>
</html>
